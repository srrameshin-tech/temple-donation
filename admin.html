<!DOCTYPE html>
<html>
<head>
<title>Admin - Add Donation</title>
<style>
body {
  font-family: Arial;
  text-align: center;
}
input, button {
  padding: 10px;
  margin: 5px;
}
</style>
</head>

<body>

<h2>➕ Add Donation</h2>

<input type="text" id="name" placeholder="Name"><br>
<input type="number" id="amount" placeholder="Amount"><br>

<button onclick="sendData()">Submit</button>

<script>
function sendData() {
  const name = document.getElementById("name").value;
  const amount = document.getElementById("amount").value;

  const url = "PASTE_YOUR_GOOGLE_FORM_LINK_HERE";

  fetch(url, {
    method: "POST",
    mode: "no-cors",
    headers: {
      "Content-Type": "application/x-www-form-urlencoded"
    },
    body: entry.XXXX=${name}&entry.YYYY=${amount}
  });

  alert("Data Submitted!");
}
</script>

</body>
</html>
