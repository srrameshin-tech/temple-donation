<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<h2>🔐 Admin Panel</h2>

<input id="name" placeholder="Name"><br><br>
<input id="amount" type="number" placeholder="Amount"><br><br>

<button onclick="addDonation()">Add Donation</button>

<script>
const supabase = window.supabase.createClient(
  "https://ugcinzaizdvkbqpvdjey.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnY2luemFpemR2a2JxcHZkamV5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2ODYwODYsImV4cCI6MjA5MjI2MjA4Nn0.mfFEZ7BSNExwXp3vBOp0DPmMCB2g34qQEvrXcOgt3Oo"
);

async function addDonation() {
  const name = document.getElementById("name").value;
  const amount = document.getElementById("amount").value;

  const { data, error } = await supabase
    .from("donations")
    .insert([
      { name: name, amount: parseInt(amount) }
    ]);

  if (error) {
    alert("Error: " + error.message);
    console.log(error);
  } else {
    alert("✅ Added Successfully");
    document.getElementById("name").value = "";
    document.getElementById("amount").value = "";
  }
}
</script>

</body>
</html>
