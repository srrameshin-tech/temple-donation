<!DOCTYPE html>
<html>
<head>
  <title>Admin Login</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
      margin-top: 100px;
    }

    input {
      padding: 10px;
      width: 200px;
    }

    button {
      padding: 10px;
      margin-top: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>🔐 Admin Login</h2>

<input type="password" id="pass" placeholder="Enter Password"><br>
<button onclick="login()">Login</button>

<script>
function login() {
  const password = document.getElementById("pass").value;

  if (password === "1234") {
    window.location.href = "https://docs.google.com/spreadsheets";
  } else {
    alert("Wrong Password");
  }
}
</script>

</body>
</html>
