<!DOCTYPE html>
<html>
<head>
  <title>Temple Donation</title>

  <!-- MOBILE FIX -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
      margin: 0;
      padding: 10px;
    }

    h2 {
      font-size: 24px;
      margin-top: 10px;
    }

    h3 {
      font-size: 20px;
      color: green;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      font-size: 16px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      font-size: 16px;
    }

    th, td {
      padding: 10px;
      border: 1px solid #ccc;
    }

    th {
      background: #333;
      color: white;
    }

    /* MOBILE RESPONSIVE */
    @media (max-width: 600px) {
      h2 {
        font-size: 20px;
      }

      h3 {
        font-size: 18px;
      }

      table {
        font-size: 14px;
      }

      th, td {
        padding: 8px;
      }

      button {
        width: 100%;
        font-size: 16px;
      }
    }
  </style>
</head>

<body>

<h2>🙏 Temple Donation</h2>
<h3>Total: ₹ <span id="total">0</span></h3>

<button onclick="loadData()">Refresh</button>

<table id="table">
  <tr>
    <th>Date & Time</th>
    <th>Name</th>
    <th>Amount</th>
  </tr>
</table>

<script>
const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRUVPfJWvJBwNoFEQyCjF_x33Vs6MrymUehuVX2UX7p6WbjrulJGm2DwlSX6U-DQt4Lh-t3k-sAD-iJ/pub?output=csv";

// Proper CSV row parser — handles quoted fields that contain commas
// (e.g. a donor name like "Ramesh, Coimbatore"), which a plain split(",") would break.
function parseCSVRow(row) {
  const cols = [];
  let cur = '';
  let inQuotes = false;
  for (let i = 0; i < row.length; i++) {
    const ch = row[i];
    if (inQuotes) {
      if (ch === '"' && row[i + 1] === '"') { cur += '"'; i++; }
      else if (ch === '"') { inQuotes = false; }
      else { cur += ch; }
    } else {
      if (ch === '"') inQuotes = true;
      else if (ch === ',') { cols.push(cur); cur = ''; }
      else cur += ch;
    }
  }
  cols.push(cur);
  return cols;
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

async function loadData() {
  const res = await fetch(url);
  const data = await res.text();

  const rows = data.split("\n");
  let total = 0;

  let table = `
  <tr>
    <th>Date & Time</th>
    <th>Name</th>
    <th>Amount</th>
  </tr>`;

  for (let i = 1; i < rows.length; i++) {
    if (!rows[i].trim()) continue;
    const cols = parseCSVRow(rows[i]);

    if (cols.length < 3) continue;

    const date = cols[0];
    const name = cols[1];
    const amount = parseFloat(cols[2]);

    if (!isNaN(amount)) {
      total += amount;

      table += `
      <tr>
        <td>${escapeHtml(date)}</td>
        <td>${escapeHtml(name)}</td>
        <td>₹ ${amount}</td>
      </tr>`;
    }
  }

  document.getElementById("table").innerHTML = table;
  document.getElementById("total").innerText = total;
}

/* AUTO LOAD + AUTO REFRESH */
loadData();
setInterval(loadData, 10000);
</script>

</body>
</html>
