<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f5f5f5;
  margin: 0;
  padding: 10px;
}

/* Title */
h2 {
  font-size: 24px;
}

h3 {
  font-size: 20px;
  color: green;
}

/* Button */
button {
  padding: 10px 20px;
  margin: 10px;
  font-size: 16px;
  background: #007bff;
  color: white;
  border: none;
  border-radius: 5px;
}

/* Table */
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 16px;
}

th, td {
  padding: 10px;
  border: 1px solid #ccc;
}

/* Header */
th {
  background: #333;
  color: white;
}

/* MOBILE FIX */
@media (max-width: 600px) {
  h2 {
    font-size: 20px;
  }

  h3 {
    font-size: 18px;
  }

  table {
    font-size: 14px;
  }

  th, td {
    padding: 8px;
  }

  button {
    width: 100%;
    font-size: 16px;
  }
}
</style>
