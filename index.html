<!DOCTYPE html>
<html>
<head>
  <title>Temple Donation</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
    }

    h2 {
      color: #333;
    }

    h3 {
      color: green;
    }

    button {
      padding: 8px 15px;
      margin: 10px;
      cursor: pointer;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
    }

    table {
      margin: auto;
      border-collapse: collapse;
      width: 90%;
      background: white;
    }

    th, td {
      padding: 10px;
      border: 1px solid #ccc;
    }

    th {
      background: #333;
      color: white;
    }
  </style>
</head>

<body>

<h2>🙏 Temple Donation</h2>
<h3>Total: ₹ <span id="total">0</span></h3>

<button onclick="loadData()">Refresh</button>

<table id="table">
  <tr>
    <th>Date & Time</th>
    <th>Name</th>
    <th>Amount</th>
  </tr>
</table>

<script>
const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRUVPfJWvJBwNoFEQyCjF_x33Vs6MrymUehuVX2UX7p6WbjrulJGm2DwlSX6U-DQt4Lh-t3k-sAD-iJ/pub?output=csv";

async function loadData() {
  const res = await fetch(url);
  const data = await res.text();

  const rows = data.split("\n");
  let total = 0;

  let table = `
  <tr>
    <th>Date & Time</th>
    <th>Name</th>
    <th>Amount</th>
  </tr>`;

  for (let i = 1; i < rows.length; i++) {
    const cols = rows[i].split(",");

    if (cols.length < 3) continue;

    const date = cols[0];
    const name = cols[1];
    const amount = parseFloat(cols[2]);

    if (!isNaN(amount)) {
      total += amount;

      table += `
      <tr>
        <td>${date}</td>
        <td>${name}</td>
        <td>₹ ${amount}</td>
      </tr>`;
    }
  }

  document.getElementById("table").innerHTML = table;
  document.getElementById("total").innerText = total;
}

// Auto load + auto refresh every 10 sec
loadData();
setInterval(loadData, 10000);
</script>

</body>
</html>
